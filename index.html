<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agrotrack - Login</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="loginForm" style="display: flex; flex-direction: column; gap: 10px; max-width: 300px; margin: 50px auto;">
        <h1>Agrotrack Login</h1>
        <input type="password" id="passwordInput" placeholder="Inserisci la password">
        <button onclick="authenticateUser()">Accedi</button>
        <div id="errorMsg" style="color: red; display: none;"></div>
    </div>
    
    <div id="mainContent" style="display: none;">
        <h1>Benvenuto in Agrotrack</h1>
        <!-- Aggiungi il resto dei tuoi contenuti qui -->
    </div>

    <script>
        function authenticateUser() {
            const password = document.getElementById('passwordInput').value;
            const correctPassword = "Agro2026";
            
            if (password === correctPassword) {
                document.getElementById('loginForm').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
            } else {
                document.getElementById('errorMsg').textContent = 'Password errata!';
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('passwordInput').value = '';
            }
        }
        
        // Permetti di premere Enter per inviare
        document.addEventListener('DOMContentLoaded', function() {
            document.getElementById('passwordInput').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    authenticateUser();
                }
            });
        });
    </script>
</body>
</html>
